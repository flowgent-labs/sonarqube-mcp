# Generated by https://github.com/flowgent-labs/mcpfather

name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    if: "!startsWith(github.event.head_commit.message, 'Merge pull request #')"
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine version bump
        id: bump
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          COMMIT_MSG=$(echo "${COMMIT_MSG}" | head -1)

          SHOULD_RELEASE=false
          BUMP_LEVEL=""
          if echo "${COMMIT_MSG}" | grep -qiE "^refactor:"; then
            SHOULD_RELEASE=true
            BUMP_LEVEL="major"
          elif echo "${COMMIT_MSG}" | grep -qiE "^feat:"; then
            SHOULD_RELEASE=true
            BUMP_LEVEL="minor"
          elif echo "${COMMIT_MSG}" | grep -qiE "^fix:"; then
            SHOULD_RELEASE=true
            BUMP_LEVEL="patch"
          fi

          if [ "${SHOULD_RELEASE}" != "true" ]; then
            echo "Commit type does not trigger a release (only feat:, fix:, refactor:). Skipping."
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Get latest tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: ${LATEST_TAG}"

          # Parse semver
          MAJOR=$(echo "${LATEST_TAG}" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "${LATEST_TAG}" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "${LATEST_TAG}" | sed 's/v//' | cut -d. -f3)

          case "${BUMP_LEVEL}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          echo "Bump: ${BUMP_LEVEL} (${COMMIT_MSG})"

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "New tag: ${NEW_TAG}"
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "new_tag=${NEW_TAG}" >> $GITHUB_OUTPUT

      - name: Create Git Tag
        if: steps.bump.outputs.should_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.new_tag }}" -m "Release ${{ steps.bump.outputs.new_tag }}"
          git push origin "${{ steps.bump.outputs.new_tag }}"

  build-push-image:
    needs: release
    if: needs.release.outputs.new_tag != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/sonarqube-mcp:${{ needs.release.outputs.new_tag }}
            ghcr.io/${{ github.repository_owner }}/sonarqube-mcp:latest
          platforms: linux/amd64,linux/arm64
