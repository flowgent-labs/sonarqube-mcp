# Generated by https://github.com/flowgent-labs/mcpfather
#
# CI workflow — triggered on PR lifecycle events (NOT on merge to main).
#
# Event matrix:
#   pull_request (opened, synchronize, reopened) → build + unit test
#   schedule (daily)                              → same, against main branch
#
# Deliberately NOT triggered by:
#   - push to main (merge commits are handled by release.yml)
#   - pull_request:closed (merged → release.yml; closed-without-merge is no-op)
#
# Concurrency: same PR/branch cancels the previous in-progress run.

name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  schedule:
    # Daily build on main branch (03:07 UTC)
    - cron: "7 3 * * *"

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        run: make build

      - name: Unit Tests
        run: make test
