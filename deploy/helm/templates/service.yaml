apiVersion: v1
kind: Service
metadata:
  name: {{ include "sonarqube-mcp.fullname" . }}
  labels:
    {{- include "sonarqube-mcp.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    - port: {{ .Values.service.mgmtPort }}
      targetPort: mgmt
      protocol: TCP
      name: mgmt
  selector:
    {{- include "sonarqube-mcp.selectorLabels" . | nindent 4 }}
