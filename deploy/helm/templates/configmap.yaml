apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "sonarqube-mcp.fullname" . }}-config
  labels:
    {{- include "sonarqube-mcp.labels" . | nindent 4 }}
data:
  config.yaml: |
    # MCP server configuration — generated by mcpfather
    upstream:
      endpoint: {{ .Values.config.upstream.endpoint | quote }}
      enable_mcp_session_forward: {{ .Values.config.upstream.enableMCPSessionForwarding }}

    auth:
      # Frontend (inbound): validates bearer tokens presented by MCP clients.
      frontend:
        oidc:
          enabled: {{ .Values.config.auth.frontend.oidc.enabled }}
          issuer: {{ .Values.config.auth.frontend.oidc.issuer | quote }}
          jwks_uri: {{ .Values.config.auth.frontend.oidc.jwksUri | quote }}
          audience: {{ .Values.config.auth.frontend.oidc.audience | quote }}

      # Backend (outbound): credentials used to call upstream APIs.
      backend:
        oidc:
          enabled: {{ .Values.config.auth.backend.oidc.enabled }}
          issuer: {{ .Values.config.auth.backend.oidc.issuer | quote }}
          client_id: {{ .Values.config.auth.backend.oidc.clientId | quote }}
          scopes: {{ .Values.config.auth.backend.oidc.scopes | quote }}
          token_url: {{ .Values.config.auth.backend.oidc.tokenUrl | quote }}
          client_secret: ""   # set via MCP__AUTH__BACKEND__OIDC__CLIENT_SECRET env (from Secret)

        ldap:
          enabled: {{ .Values.config.auth.backend.ldap.enabled }}
          url: {{ .Values.config.auth.backend.ldap.url | quote }}
          base_dn: {{ .Values.config.auth.backend.ldap.baseDN | quote }}
          bind_dn: {{ .Values.config.auth.backend.ldap.bindDN | quote }}
          bind_password: ""   # set via MCP__AUTH__BACKEND__LDAP__BIND_PASSWORD env (from Secret)
          insecure_skip_verify: {{ .Values.config.auth.backend.ldap.insecureSkipVerify }}
          timeout: {{ .Values.config.auth.backend.ldap.timeout }}

        static:
          bearer_token: ""    # set via MCP__AUTH__BACKEND__STATIC__BEARER_TOKEN env (from Secret)
          cookie_token: ""    # set via MCP__AUTH__BACKEND__STATIC__COOKIE_TOKEN env (from Secret)

    nativeTools:
      expose:
        register_all_tools_by_default: {{ .Values.config.tools.registerAllByDefault }}
        includes:
          {{- range .Values.config.tools.includes }}
          - {{ . | quote }}
          {{- end }}
        excludes:
          {{- range .Values.config.tools.excludes }}
          - {{ . | quote }}
          {{- end }}

    mgmt:
      enabled: {{ .Values.config.mgmt.enabled }}
      host: "0.0.0.0"
      port: {{ .Values.service.mgmtPort }}
      otel:
        enabled: {{ .Values.config.mgmt.otel.enabled }}
        endpoint: {{ .Values.config.mgmt.otel.endpoint | quote }}
        protocol: {{ .Values.config.mgmt.otel.protocol | quote }}
        timeout: 10000
        sample_rate: {{ .Values.config.mgmt.otel.sampleRate }}
      metrics:
        enabled: {{ .Values.config.mgmt.metrics.enabled }}
        prometheus: {{ .Values.config.mgmt.metrics.prometheus }}
        export_interval: "30s"

    runtime:
      log_authorization: {{ .Values.config.runtime.logAuthorization }}
      download_dir: {{ .Values.config.runtime.downloadDir | default "" | quote }}

    virtualTools:
        {{- toYaml .Values.config.virtualTools | nindent 6 }}
