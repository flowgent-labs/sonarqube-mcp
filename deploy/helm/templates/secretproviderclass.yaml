{{- if (include "sonarqube-mcp.useGCPSecret" .) }}
{{- if .Values.secret.gcp.credentialsFile }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sonarqube-mcp.fullname" . }}-gcp-sa
  labels:
    {{- include "sonarqube-mcp.labels" . | nindent 4 }}
type: Opaque
data:
  key.json: {{ .Values.secret.gcp.credentialsFile | b64enc | quote }}
{{- end }}
---
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "sonarqube-mcp.fullname" . }}-spc
  labels:
    {{- include "sonarqube-mcp.labels" . | nindent 4 }}
spec:
  provider: gcp
  parameters:
    secrets: |
      - resourceName: "projects/{{ required "secret.gcp.projectId is required when provider is gcp" .Values.secret.gcp.projectId }}/secrets/{{ required "secret.gcp.secretId is required when provider is gcp" .Values.secret.gcp.secretId }}/versions/latest"
        fileName: "oidc_client_secret"
        key: "oidc_client_secret"
      - resourceName: "projects/{{ .Values.secret.gcp.projectId }}/secrets/{{ .Values.secret.gcp.secretId }}/versions/latest"
        fileName: "bearer_token"
        key: "bearer_token"
      - resourceName: "projects/{{ .Values.secret.gcp.projectId }}/secrets/{{ .Values.secret.gcp.secretId }}/versions/latest"
        fileName: "cookie_token"
        key: "cookie_token"
{{- if .Values.secret.gcp.credentialsFile }}
  secretObjects:
    - secretName: {{ include "sonarqube-mcp.fullname" . }}-gcp-secret
      type: Opaque
      data:
        - objectName: "oidc_client_secret"
          key: "oidc_client_secret"
        - objectName: "bearer_token"
          key: "bearer_token"
        - objectName: "cookie_token"
          key: "cookie_token"
{{- end }}
{{- end }}
